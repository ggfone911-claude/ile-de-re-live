*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#f0f4f8;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;color:#0d2333;-webkit-tap-highlight-color:transparent;overscroll-behavior:none;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes sheetIn{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes backdropIn{from{opacity:0}to{opacity:1}}
.card{background:#fff;border-radius:18px;box-shadow:0 2px 16px rgba(11,61,82,.08);overflow:hidden;}
.fade{animation:fadeIn .25s ease;}
input{outline:none;-webkit-appearance:none;border-radius:10px;}
input::placeholder{color:#aac4d0;}
button{-webkit-appearance:none;touch-action:manipulation;}
::-webkit-scrollbar{display:none;}
.sheet-backdrop{position:fixed;inset:0;background:rgba(11,61,82,.45);z-index:100;animation:backdropIn .2s ease;}
.sheet{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:24px 24px 0 0;z-index:101;max-height:88vh;display:flex;flex-direction:column;animation:sheetIn .3s cubic-bezier(.32,1,.65,1);padding-bottom:env(safe-area-inset-bottom);}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:#ddeaf0;margin:10px auto 0;}
.spot-list{overflow-y:auto;flex:1;padding:0 16px 20px;}
.region-label{font-size:11px;font-weight:700;color:#5a7d8c;text-transform:uppercase;letter-spacing:.8px;padding:14px 0 6px;}
.spot-row{display:flex;align-items:center;padding:12px 14px;border-radius:14px;cursor:pointer;gap:12px;margin-bottom:2px;transition:background .1s;}
.spot-row:active{background:#e8f5fb;}
.spot-row.active{background:#e8f5fb;}
@media(max-width:380px){.metric-grid{grid-template-columns:repeat(2,1fr)!important;}}

/* ── TIDE CHART ── */
function TideChart({ points }) {
  const ref = useRef(null);
  const [tooltip, setTooltip] = useState("");
  const draw = useCallback(() => {
    const canvas = ref.current;
    if (!canvas || !points?.length) return;
    const dpr = window.devicePixelRatio || 1;
    const W = canvas.offsetWidth, H = 200;
    canvas.width = W*dpr; canvas.height = H*dpr;
    const ctx = canvas.getContext("2d");
    ctx.scale(dpr,dpr);
    const pad={t:16,r:12,b:28,l:44};
    const cw=W-pad.l-pad.r, ch=H-pad.t-pad.b;
    const hMax=Math.max(...points.map(p=>p.height))+0.3;
    const tFirst=new Date(points[0].time).getTime();
    const tSpan=new Date(points[points.length-1].time).getTime()-tFirst;
    const xP=t=>pad.l+(new Date(t).getTime()-tFirst)/tSpan*cw;
    const yP=h=>pad.t+ch-(h/hMax)*ch;
    ctx.fillStyle="#f8fbfd"; ctx.fillRect(0,0,W,H);
    const step=hMax>5?1:0.5;
    for(let h=0;h<=hMax;h+=step){
      const y=yP(h);
      ctx.strokeStyle="rgba(11,61,82,.06)"; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
      ctx.fillStyle=C.sub; ctx.font="10px system-ui"; ctx.textAlign="right";
      ctx.fillText(h.toFixed(h<1?1:0)+"m",pad.l-5,y+4);
    }
    for(let hh=0;hh<=24;hh+=3){
      const x=pad.l+(hh/24)*cw;
      ctx.strokeStyle="rgba(11,61,82,.04)"; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(x,pad.t); ctx.lineTo(x,H-pad.b); ctx.stroke();
      ctx.fillStyle=C.sub; ctx.textAlign="center"; ctx.font="10px system-ui";
      ctx.fillText(String(hh).padStart(2,"0")+"h",x,H-pad.b+14);
    }
    const fill=ctx.createLinearGradient(0,pad.t,0,H-pad.b);
    fill.addColorStop(0,"rgba(26,127,160,.18)"); fill.addColorStop(1,"rgba(26,127,160,.02)");
    ctx.fillStyle=fill; ctx.beginPath();
    ctx.moveTo(xP(points[0].time),H-pad.b);
    points.forEach(p=>ctx.lineTo(xP(p.time),yP(p.height)));
    ctx.lineTo(xP(points[points.length-1].time),H-pad.b); ctx.closePath(); ctx.fill();
    ctx.strokeStyle=C.ocean; ctx.lineWidth=2.5; ctx.lineJoin="round"; ctx.beginPath();
    points.forEach((p,i)=>i===0?ctx.moveTo(xP(p.time),yP(p.height)):ctx.lineTo(xP(p.time),yP(p.height)));
    ctx.stroke();
    for(let i=1;i<points.length-1;i++){
      const p=points[i],pv=points[i-1],nx=points[i+1];
      const isPM=p.height>pv.height&&p.height>nx.height;
      const isBM=p.height<pv.height&&p.height<nx.height;
      if(!isPM&&!isBM) continue;
      const x=xP(p.time),y=yP(p.height),col=isPM?C.navy:C.sky;
      ctx.fillStyle=col; ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle="#fff"; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2); ctx.stroke();
      ctx.fillStyle=col; ctx.textAlign="center"; ctx.font="bold 10px system-ui";
      ctx.fillText(p.height.toFixed(2)+"m",x,y+(isPM?-12:18));
      ctx.font="9px system-ui"; ctx.fillStyle=C.sub;
      ctx.fillText(new Date(p.time).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit",timeZone:"Europe/Paris"}),x,y+(isPM?-22:28));
    }
    const nowMs=Date.now();
    if(nowMs>=tFirst&&nowMs<=tFirst+tSpan){
      const frac=(nowMs-tFirst)/tSpan;
      const hNow=points[Math.min(Math.round(frac*(points.length-1)),points.length-1)]?.height??0;
      const xNow=pad.l+frac*cw,yNow=yP(hNow);
      ctx.strokeStyle=C.alert; ctx.lineWidth=1.5; ctx.setLineDash([4,3]);
      ctx.beginPath(); ctx.moveTo(xNow,pad.t); ctx.lineTo(xNow,H-pad.b); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle=C.alert; ctx.beginPath(); ctx.arc(xNow,yNow,5,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle="#fff"; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(xNow,yNow,5,0,Math.PI*2); ctx.stroke();
    }
  },[points]);
  useEffect(()=>{draw();},[draw]);
  useEffect(()=>{const ro=new ResizeObserver(draw);if(ref.current)ro.observe(ref.current);return()=>ro.disconnect();},[draw]);
  const handleMove=e=>{
    if(!ref.current||!points?.length) return;
    const rect=ref.current.getBoundingClientRect();
    const mx=(e.touches?.[0]?.clientX??e.clientX)-rect.left;
    const frac=Math.max(0,Math.min(1,(mx-44)/(rect.width-56)));
    const p=points[Math.round(frac*(points.length-1))];
    if(!p) return;
    setTooltip(`${new Date(p.time).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit",timeZone:"Europe/Paris"})} — ${p.height.toFixed(2)} m`);
  };
  return(
    <div>
      <canvas ref={ref} style={{width:"100%",height:200,display:"block",borderRadius:12,cursor:"crosshair"}}
        onMouseMove={handleMove} onTouchMove={handleMove} onMouseLeave={()=>setTooltip("")} onTouchEnd={()=>setTooltip("")}/>
      <div style={{textAlign:"center",fontSize:12,marginTop:6,minHeight:16,color:tooltip?C.ocean:C.sub,fontWeight:tooltip?600:400,transition:"color .15s"}}>
        {tooltip||"Glissez pour voir la hauteur"}
      </div>
    </div>
  );
}

/* ── SPOT SELECTOR ── */
function SpotSelector({ selected, onSelect, onClose }) {
  const [query, setQuery] = useState("");
  const inputRef = useRef(null);

  useEffect(()=>{
    setTimeout(()=>inputRef.current?.focus(),350);
  },[]);

  const filtered = useMemo(()=>{
    const q = query.toLowerCase().trim();
    if(!q) return SPOTS;
    return SPOTS.filter(s=>
      s.name.toLowerCase().includes(q) ||
      s.region.toLowerCase().includes(q)
    );
  },[query]);

  const regions = useMemo(()=>{
    const r = [];
    const seen = new Set();
    filtered.forEach(s=>{ if(!seen.has(s.region)){ seen.add(s.region); r.push(s.region); }});
    return r;
  },[filtered]);

  return(
    <>
      <div className="sheet-backdrop" onClick={onClose}/>
      <div className="sheet">
        <div className="sheet-handle"/>
        <div style={{padding:"14px 16px 10px",display:"flex",alignItems:"center",gap:10}}>
          <div style={{flex:1,display:"flex",alignItems:"center",gap:8,background:C.bg,borderRadius:12,padding:"9px 12px"}}>
            {Icon.search(C.sub,16)}
            <input ref={inputRef} value={query} onChange={e=>setQuery(e.target.value)}
              placeholder="Rechercher un spot…"
              style={{flex:1,border:"none",background:"transparent",fontSize:15,color:C.text}}/>
            {query&&<button onClick={()=>setQuery("")} style={{background:"none",border:"none",padding:0,cursor:"pointer",display:"flex"}}>{Icon.x(C.sub,14)}</button>}
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",padding:"6px",cursor:"pointer",display:"flex",borderRadius:8}}>
            {Icon.close(C.sub,20)}
          </button>
        </div>
        <div className="spot-list">
          {regions.map(region=>(
            <div key={region}>
              <div className="region-label">{region}</div>
              {filtered.filter(s=>s.region===region).map(s=>(
                <div key={s.id} className={`spot-row${s.id===selected.id?" active":""}`}
                  onClick={()=>{onSelect(s);onClose();}}>
                  <div style={{width:32,height:32,borderRadius:10,background:s.id===selected.id?C.skyBg:C.bg,
                    display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    {Icon.pin(s.id===selected.id?C.ocean:C.sub,14)}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:15,fontWeight:s.id===selected.id?700:500,color:s.id===selected.id?C.navy:C.text}}>{s.name}</div>
                    <div style={{fontSize:11,color:C.sub,marginTop:1}}>{s.region}</div>
                  </div>
                  {s.id===selected.id&&<div style={{width:8,height:8,borderRadius:"50%",background:C.ocean,flexShrink:0}}/>}
                </div>
              ))}
            </div>
          ))}
          {!filtered.length&&<div style={{padding:"40px 0",textAlign:"center",color:C.sub,fontSize:14}}>Aucun spot trouvé</div>}
        </div>
      </div>
    </>
  );
}

/* ── APP ── */
function App() {
  const DEFAULT_SPOT = SPOTS.find(s=>s.id==="ile-de-re") || SPOTS[0];

  const [spot, setSpot] = useState(()=>{
    try{
      const id = localStorage.getItem("surf_spot");
      return (id && SPOTS.find(s=>s.id===id)) || DEFAULT_SPOT;
    }catch{ return DEFAULT_SPOT; }
  });
  const [showSelector, setShowSelector] = useState(false);
  const [tab, setTab] = useState("ventlive");

  // Wind state
  const [wind, setWind] = useState(null);
  const [windLoad, setWindLoad] = useState(false);

  // Tides state
  const [apiKey] = useState(()=>{try{return localStorage.getItem("apimaree_key")||"d9c83d8ea93df6cc3cbb80be0745e581";}catch{return "d9c83d8ea93df6cc3cbb80be0745e581";}});
  const [tidePoints, setTidePoints] = useState(null);
  const [extrema, setExtrema] = useState([]);
  const [coef, setCoef] = useState(null);
  const [nowH, setNowH] = useState(null);
  const [tideLoad, setTideLoad] = useState(false);
  const [tideError, setTideError] = useState("");

  const DIR16=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSO','SO','OSO','O','ONO','NO','NNO'];
  const degToDir=d=>DIR16[Math.round(d/22.5)%16];
  const toKn=ms=>Math.round(ms*1.94384);
  const toBft=kn=>kn<1?0:kn<4?1:kn<7?2:kn<11?3:kn<17?4:kn<22?5:kn<28?6:kn<34?7:kn<41?8:kn<48?9:kn<56?10:kn<64?11:12;

  const fetchWind = useCallback(async(s)=>{
    setWindLoad(true); setWind(null);
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${s.lat}&longitude=${s.lon}&current=wind_speed_10m,wind_direction_10m,wind_gusts_10m,temperature_2m,relative_humidity_2m,pressure_msl&hourly=wind_speed_10m,wind_direction_10m,wind_gusts_10m&timezone=Europe%2FParis&forecast_days=2&wind_speed_unit=ms`;
    try{
      const r=await fetch(url);
      if(!r.ok) throw new Error(`HTTP ${r.status}`);
      const d=await r.json();
      if(!d.current) throw new Error("Données indisponibles.");
      setWind(d);
    }catch(e){setWind({error:e.message});}
    finally{setWindLoad(false);}
  },[]);

  const computeExtrema=pts=>{
    const ex=[];
    for(let i=1;i<pts.length-1;i++){
      const p=pts[i],pv=pts[i-1],nx=pts[i+1];
      if(p.height>pv.height&&p.height>nx.height) ex.push({...p,type:"PM"});
      if(p.height<pv.height&&p.height<nx.height) ex.push({...p,type:"BM"});
    }
    return ex;
  };

  const loadTides = useCallback(async(s)=>{
    if(!s.tide){ setTideError("Pas de station marée pour ce spot."); return; }
    setTideLoad(true); setTideError(""); setTidePoints(null); setExtrema([]); setCoef(null); setNowH(null);
    const now=new Date(), p2=n=>String(n).padStart(2,"0");
    const d=`${now.getFullYear()}-${p2(now.getMonth()+1)}-${p2(now.getDate())}`;
    try{
      const r=await fetch(`https://api-maree.fr/water-levels?site=${s.tide}&from=${d}T00:00&to=${d}T23:59&step=10&tz=Europe/Paris&key=${encodeURIComponent(apiKey)}`);
      if(!r.ok) throw new Error(r.status===401||r.status===403?"Clé API invalide.":`Erreur ${r.status}`);
      const data=await r.json();
      if(!data.data?.length) throw new Error("Aucune donnée.");
      const pts=data.data, ex=computeExtrema(pts);
      setTidePoints(pts); setExtrema(ex);
      const pm=ex.find(e=>e.type==="PM"), bm=ex.find(e=>e.type==="BM");
      if(pm&&bm) setCoef(Math.max(20,Math.min(120,Math.round(20+(pm.height-bm.height-0.6)/5*100))));
      const tF=new Date(pts[0].time).getTime(), tL=new Date(pts[pts.length-1].time).getTime(), nMs=Date.now();
      if(nMs>=tF&&nMs<=tL) setNowH(pts[Math.round((nMs-tF)/(tL-tF)*(pts.length-1))]?.height);
    }catch(e){setTideError(e.message);}
    finally{setTideLoad(false);}
  },[apiKey]);

  // On spot change: reset + reload
  useEffect(()=>{
    try{ localStorage.setItem("surf_spot", spot.id); }catch{}
    setWind(null); setTidePoints(null); setExtrema([]); setCoef(null); setNowH(null); setTideError("");
    if(tab==="ventlive") fetchWind(spot);
    if(tab==="marees") loadTides(spot);
  },[spot]);

  useEffect(()=>{
    if(tab==="ventlive") fetchWind(spot);
    if(tab==="marees") loadTides(spot);
  },[tab]);

  // Initial load
  useEffect(()=>{ fetchWind(spot); loadTides(spot); },[]);

  const fmtH=iso=>new Date(iso).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit",timeZone:"Europe/Paris"});
  const today=new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});
  const timeStr=new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit",timeZone:"Europe/Paris"});

  const wc=wind?.current;
  const kn=wc?toKn(wc.wind_speed_10m):null;
  const gustKn=wc?toKn(wc.wind_gusts_10m):null;
  const bft=kn!=null?toBft(kn):null;
  const dir=wc?.wind_direction_10m;
  const cond=kn==null?null:
    kn>=12&&kn<=25?{label:"Idéal kite / planche",bg:C.skyBg,color:C.ocean}:
    kn>=6?{label:"Bon pour le surf",bg:C.greenBg,color:C.green}:
    kn<6?{label:"Vent calme",bg:"#f5f5f5",color:C.sub}:
    {label:"Vent fort — prudence",bg:C.alertBg,color:C.alert};

  const now2=new Date();
  const nextH=wind?.hourly?wind.hourly.time.reduce((acc,t,i)=>{
    if(acc.length>=8) return acc;
    if(new Date(t)>now2) acc.push({t:new Date(t),spKn:toKn(wind.hourly.wind_speed_10m[i]),gKn:toKn(wind.hourly.wind_gusts_10m[i]),dir:wind.hourly.wind_direction_10m[i]});
    return acc;
  },[]):[];
  const maxSpKn=nextH.length?Math.max(...nextH.map(h=>h.spKn)):1;

  const TABS=[
    {id:"ventlive", label:"Vent",      bg:C.ocean,
     ic:a=><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={a} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/></svg>},
    {id:"marees",   label:"Marées",    bg:C.sky,
     ic:a=><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={a} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5s2.5 2 5 2 2.5-2 5-2 2.5 2 5 2"/><path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2s2.5 2 5 2 2.5-2 5-2 2.5 2 5 2"/><path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2s2.5 2 5 2 2.5-2 5-2 2.5 2 5 2"/></svg>},
    {id:"previsions",label:"Prévisions",bg:C.green,
     ic:a=><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={a} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 20c6-6 8-14 18-16"/><path d="M2 20c4 0 8-2 12-6"/><circle cx="17" cy="8" r="2"/></svg>},
  ];

  return(
    <div style={{background:C.bg,minHeight:"100vh",paddingBottom:"max(40px,calc(env(safe-area-inset-bottom) + 20px))"}}>

      {/* ── HEADER ── */}
      <div style={{background:C.white,borderBottom:`1px solid ${C.border}`,
        padding:"max(16px,calc(env(safe-area-inset-top) + 10px)) max(18px,calc(env(safe-area-inset-right)+10px)) 12px max(18px,calc(env(safe-area-inset-left)+10px))",
        display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:10}}>
        <div style={{width:40,height:40,borderRadius:12,background:C.navy,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M2 20c6-6 8-14 18-16"/><path d="M2 20c4 0 8-2 12-6"/><circle cx="17" cy="8" r="2"/>
          </svg>
        </div>
        {/* Spot selector button */}
        <button onClick={()=>setShowSelector(true)} style={{flex:1,display:"flex",alignItems:"center",gap:8,background:C.bg,
          border:`1.5px solid ${C.border}`,borderRadius:12,padding:"8px 12px",cursor:"pointer",textAlign:"left"}}>
          <div style={{flex:1}}>
            <div style={{fontSize:15,fontWeight:700,color:C.navy,letterSpacing:"-.2px",lineHeight:1.1}}>{spot.name}</div>
            <div style={{fontSize:11,color:C.sub,marginTop:2}}>{spot.region}</div>
          </div>
          {Icon.chevDown(C.ocean,16)}
        </button>
        <div style={{display:"flex",alignItems:"center",gap:5,background:C.greenBg,borderRadius:20,padding:"4px 10px",flexShrink:0}}>
          <span style={{width:6,height:6,borderRadius:"50%",background:C.green,display:"inline-block",animation:"blink 1.4s ease-in-out infinite"}}/>
          <span style={{fontSize:10,fontWeight:700,color:C.green,letterSpacing:".5px"}}>LIVE</span>
        </div>
      </div>

      {/* ── TABS ── */}
      <div style={{display:"flex",gap:8,
        padding:"10px max(16px,calc(env(safe-area-inset-right)+10px)) 10px max(16px,calc(env(safe-area-inset-left)+10px))",
        overflowX:"auto",scrollbarWidth:"none",background:C.white,borderBottom:`1px solid ${C.border}`}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            display:"flex",alignItems:"center",gap:6,padding:"9px 14px",borderRadius:22,
            border:`1.5px solid ${tab===t.id?t.bg:C.border}`,cursor:"pointer",fontWeight:600,
            fontSize:14,whiteSpace:"nowrap",flexShrink:0,
            background:tab===t.id?t.bg:C.white,color:tab===t.id?C.white:C.sub,
            boxShadow:tab===t.id?`0 2px 8px ${t.bg}44`:"none",transition:"all .15s",

        {/* ══ VENT ══ */}

                    {label:"Humidité",val:`${Math.round(wc.relative_humidity_2m)}`,unit:"%",sub:"",color:C.sky},

                    <div key={i} style={{flex:"1 0 auto",minWidth:100,textAlign:"center",
                      background:e.type==="PM"?C.skyBg:C.bg,borderRadius:14,padding:"16px 12px",border:`1px solid ${C.border}`}}>
                      <div style={{fontSize:11,color:C.sub,textTransform:"uppercase",letterSpacing:".6px",fontWeight:600,marginBottom:6}}>

                  </div>

            <div style={{fontSize:11,color:C.sub,textAlign:"center",padding:"4px 0 8px"}}>
              Données SHOM · api-maree.fr · IFREMER CC-BY
            </div>
          </div>
        )}

        {/* ══ PRÉVISIONS ══ */}
        {tab==="previsions"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div className="card">
              <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  {Icon.compass(C.sun,18)}
                  <span style={{fontWeight:700,fontSize:14,color:C.navy}}>Carte vent ECMWF</span>
                </div>
                <a href={`https://www.windy.com/?${spot.lat},${spot.lon},11`} target="_blank" rel="noreferrer"
                  style={{fontSize:11,color:C.ocean,textDecoration:"none",fontWeight:600}}>Plein écran</a>
              </div>
              <div style={{width:"100%",height:"min(75vw,62vh)"}}>
                <iframe
                  key={spot.id}
                  src={`https://embed.windy.com/embed.html?type=map&location=coordinates&metricRain=mm&metricTemp=°C&metricWind=km/h&zoom=10&overlay=wind&product=ecmwf&level=surface&lat=${spot.lat}&lon=${spot.lon}&detailLat=${spot.lat}&detailLon=${spot.lon}&detail=true&pressure=true&message=true`}
                  style={{width:"100%",height:"100%",border:"none",display:"block"}} allowFullScreen title="Windy"/>
              </div>
            </div>
            {spot.links?.length>0&&(
              <div className="card" style={{padding:16}}>
                <div style={{fontWeight:700,fontSize:13,color:C.navy,marginBottom:10}}>Sites de prévision — {spot.name}</div>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {spot.links.map((l,i)=>{
                    const col=[C.ocean,C.green,C.sky,C.navy,C.sun][i%5];
                    return(
                      <a key={i} href={l.u} target="_blank" rel="noreferrer"
                        style={{display:"flex",alignItems:"center",gap:12,padding:"13px 14px",borderRadius:14,
                          background:C.bg,textDecoration:"none",border:`1px solid ${C.border}`}}>
                        <div style={{width:8,height:8,borderRadius:"50%",background:col,flexShrink:0}}/>
                        <span style={{fontWeight:600,fontSize:14,color:C.navy,flex:1}}>{l.n}</span>
                        {Icon.chevron(C.border,14)}
                      </a>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        )}
      </div>

      <div style={{textAlign:"center",padding:"20px max(16px,calc(env(safe-area-inset-right)+10px)) 0",fontSize:11,color:C.border}}>
        Open-Meteo · api-maree.fr IFREMER CC-BY · Windy
      </div>

      {/* ── SPOT SELECTOR ── */}
      {showSelector&&<SpotSelector selected={spot} onSelect={s=>{setSpot(s);}} onClose={()=>setShowSelector(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').catch(e=>console.warn('SW:',e));
  });
}
</script>
</body>
</html>
