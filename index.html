const { useState, useEffect, useRef, useCallback } = React;

/* ── PALETTE ── */
const C = {

  sun:"#f5a623", sunBg:"#fff8ed", alert:"#e05c3a", alertBg:"#fdf0ec",

};

/* ── SVG ICONS ── */
const Icon = {
  wind: (color="#1a7fa0",s=22) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/></svg>,

  car:  (color="#e05c3a",s=22) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v9a2 2 0 0 1-2 2h-2"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>,
  surf: (color="#1db87a",s=22) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 20c6-6 8-14 18-16"/><path d="M2 20c4 0 8-2 12-6"/><circle cx="17" cy="8" r="2"/></svg>,
  compass:(color="#f5a623",s=18)=> <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>,
  arrowUp:(color,s=14)=> <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={color||C.sub} strokeWidth="2.5" strokeLinecap="round"><path d="M12 19V5m-7 7 7-7 7 7"/></svg>,
  chevron:(color,s=16)=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={color||C.sub} strokeWidth="2" strokeLinecap="round"><path d="m9 18 6-6-6-6"/></svg>,
  refresh:(color,s=14)=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={color||C.ocean} strokeWidth="2" strokeLinecap="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>,

const SURF_LINKS = [
  { color:C.ocean,  name:"Grenettes — Surf Forecast", sub:"Houle · Période · Vent · 16j",  url:"https://www.surf-forecast.com/breaks/Ile-de-Re-Les-Grenettes/forecasts/latest/six_day" },
  { color:C.green,  name:"Petit Bec — Surf Forecast", sub:"Portes-en-Ré · Haut niveau",    url:"https://www.surf-forecast.com/breaks/Ile-de-Re-Petit-Bec/forecasts/latest/six_day" },
  { color:C.sky,    name:"MagicSeaweed Île de Ré",    sub:"Surf report complet",            url:"https://www.magicseaweed.com/Ile-De-Re-Surf-Report/6584/" },
  { color:C.navy,   name:"Windfinder Le Bois Plage",  sub:"Superforecast 1h · 3 jours",    url:"https://fr.windfinder.com/forecast/ile_de_re_le_bois_plage_en_re" },

];

/* ── TIDE CHART ── */
function TideChart({ points }) {
  const ref = useRef(null);
  const [tooltip, setTooltip] = useState("");
  const draw = useCallback(() => {
    const canvas = ref.current;
    if (!canvas || !points?.length) return;
    const dpr = window.devicePixelRatio || 1;
    const W = canvas.offsetWidth, H = 200;
    canvas.width = W*dpr; canvas.height = H*dpr;
    const ctx = canvas.getContext("2d");
    ctx.scale(dpr,dpr);
    const pad={t:16,r:12,b:28,l:44};
    const cw=W-pad.l-pad.r, ch=H-pad.t-pad.b;
    const hMax=Math.max(...points.map(p=>p.height))+0.3;
    const tFirst=new Date(points[0].time).getTime();
    const tSpan=new Date(points[points.length-1].time).getTime()-tFirst;
    const xP=t=>pad.l+(new Date(t).getTime()-tFirst)/tSpan*cw;
    const yP=h=>pad.t+ch-(h/hMax)*ch;
    ctx.fillStyle="#f8fbfd"; ctx.fillRect(0,0,W,H);
    const step=hMax>5?1:0.5;
    for(let h=0;h<=hMax;h+=step){
      const y=yP(h);
      ctx.strokeStyle="rgba(11,61,82,.06)"; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
      ctx.fillStyle=C.sub; ctx.font="10px system-ui"; ctx.textAlign="right";
      ctx.fillText(h.toFixed(h<1?1:0)+"m",pad.l-5,y+4);
    }
    for(let hh=0;hh<=24;hh+=3){
      const x=pad.l+(hh/24)*cw;
      ctx.strokeStyle="rgba(11,61,82,.04)"; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(x,pad.t); ctx.lineTo(x,H-pad.b); ctx.stroke();
      ctx.fillStyle=C.sub; ctx.textAlign="center"; ctx.font="10px system-ui";
      ctx.fillText(String(hh).padStart(2,"0")+"h",x,H-pad.b+14);
    }
    const fill=ctx.createLinearGradient(0,pad.t,0,H-pad.b);
    fill.addColorStop(0,"rgba(26,127,160,.18)"); fill.addColorStop(1,"rgba(26,127,160,.02)");
    ctx.fillStyle=fill; ctx.beginPath();
    ctx.moveTo(xP(points[0].time),H-pad.b);
    points.forEach(p=>ctx.lineTo(xP(p.time),yP(p.height)));
    ctx.lineTo(xP(points[points.length-1].time),H-pad.b); ctx.closePath(); ctx.fill();
    ctx.strokeStyle=C.ocean; ctx.lineWidth=2.5; ctx.lineJoin="round"; ctx.beginPath();
    points.forEach((p,i)=>i===0?ctx.moveTo(xP(p.time),yP(p.height)):ctx.lineTo(xP(p.time),yP(p.height)));
    ctx.stroke();
    for(let i=1;i<points.length-1;i++){
      const p=points[i],pv=points[i-1],nx=points[i+1];
      const isPM=p.height>pv.height&&p.height>nx.height;
      const isBM=p.height<pv.height&&p.height<nx.height;
      if(!isPM&&!isBM) continue;
      const x=xP(p.time),y=yP(p.height),col=isPM?C.navy:C.sky;
      ctx.fillStyle=col; ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle="#fff"; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2); ctx.stroke();
      ctx.fillStyle=col; ctx.textAlign="center"; ctx.font="bold 10px system-ui";
      ctx.fillText(p.height.toFixed(2)+"m",x,y+(isPM?-12:18));
      ctx.font="9px system-ui"; ctx.fillStyle=C.sub;
      ctx.fillText(new Date(p.time).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit",timeZone:"Europe/Paris"}),x,y+(isPM?-22:28));
    }
    const nowMs=Date.now();
    if(nowMs>=tFirst&&nowMs<=tFirst+tSpan){
      const frac=(nowMs-tFirst)/tSpan;
      const hNow=points[Math.min(Math.round(frac*(points.length-1)),points.length-1)]?.height??0;
      const xNow=pad.l+frac*cw,yNow=yP(hNow);
      ctx.strokeStyle=C.alert; ctx.lineWidth=1.5; ctx.setLineDash([4,3]);
      ctx.beginPath(); ctx.moveTo(xNow,pad.t); ctx.lineTo(xNow,H-pad.b); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle=C.alert; ctx.beginPath(); ctx.arc(xNow,yNow,5,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle="#fff"; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(xNow,yNow,5,0,Math.PI*2); ctx.stroke();
    }
  },[points]);
  useEffect(()=>{draw();},[draw]);
  useEffect(()=>{const ro=new ResizeObserver(draw);if(ref.current)ro.observe(ref.current);return()=>ro.disconnect();},[draw]);
  const handleMove=(e)=>{
    if(!ref.current||!points?.length) return;
    const rect=ref.current.getBoundingClientRect();
    const mx=(e.touches?.[0]?.clientX??e.clientX)-rect.left;
    const frac=Math.max(0,Math.min(1,(mx-44)/(rect.width-56)));
    const p=points[Math.round(frac*(points.length-1))];
    if(!p) return;
    setTooltip(`${new Date(p.time).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit",timeZone:"Europe/Paris"})} — ${p.height.toFixed(2)} m`);
  };
  return(<div><canvas ref={ref} style={{width:"100%",height:200,display:"block",borderRadius:12,cursor:"crosshair"}} onMouseMove={handleMove} onTouchMove={handleMove} onMouseLeave={()=>setTooltip("")} onTouchEnd={()=>setTooltip("")}/><div style={{textAlign:"center",fontSize:12,marginTop:6,minHeight:16,color:tooltip?C.ocean:C.sub,fontWeight:tooltip?600:400,transition:"color .15s"}}>{tooltip||"Glissez pour voir la hauteur"}</div></div>);
}

/* ── APP ── */
function App() {
  const [tab,setTab]=useState("ventlive");
  const [apiKey,setApiKey]=useState(()=>{try{return localStorage.getItem("apimaree_key")||"d9c83d8ea93df6cc3cbb80be0745e581";}catch{return "d9c83d8ea93df6cc3cbb80be0745e581";}});
  const [tidePoints,setTidePoints]=useState(null);
  const [extrema,setExtrema]=useState([]);
  const [coef,setCoef]=useState(null);
  const [nowH,setNowH]=useState(null);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");
  const [wind,setWind]=useState(null);
  const [windSpot,setWindSpot]=useState(0);
  const [windLoad,setWindLoad]=useState(false);

  const WIND_SPOTS=[{name:"Île de Ré",lat:46.18,lon:-1.43},{name:"La Rochelle",lat:46.16,lon:-1.15}];
  const DIR16=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSO','SO','OSO','O','ONO','NO','NNO'];
  const degToDir=d=>DIR16[Math.round(d/22.5)%16];
  const toKn=ms=>Math.round(ms*1.94384);
  const toBft=kn=>kn<1?0:kn<4?1:kn<7?2:kn<11?3:kn<17?4:kn<22?5:kn<28?6:kn<34?7:kn<41?8:kn<48?9:kn<56?10:kn<64?11:12;

  const fetchWind=useCallback(async(idx)=>{
    setWindLoad(true);setWind(null);
    const s=WIND_SPOTS[idx];
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${s.lat}&longitude=${s.lon}&current=wind_speed_10m,wind_direction_10m,wind_gusts_10m,temperature_2m,relative_humidity_2m,pressure_msl&hourly=wind_speed_10m,wind_direction_10m,wind_gusts_10m&timezone=Europe%2FParis&forecast_days=2&wind_speed_unit=ms`;
    try{const r=await fetch(url);if(!r.ok)throw new Error(`HTTP ${r.status}`);const d=await r.json();if(!d.current)throw new Error("Données indisponibles.");setWind(d);}
    catch(e){setWind({error:e.message});}
    finally{setWindLoad(false);}
  },[]);

  useEffect(()=>{if(tab==="ventlive")fetchWind(windSpot);},[tab,windSpot]);

  const computeExtrema=pts=>{const ex=[];for(let i=1;i<pts.length-1;i++){const p=pts[i],pv=pts[i-1],nx=pts[i+1];if(p.height>pv.height&&p.height>nx.height)ex.push({...p,type:"PM"});if(p.height<pv.height&&p.height<nx.height)ex.push({...p,type:"BM"});}return ex;};

  const loadTides=useCallback(async(k)=>{
    const key=(k??apiKey).trim();
    if(!key){setError("Clé API requise.");return;}
    setLoading(true);setError("");setTidePoints(null);setExtrema([]);setCoef(null);setNowH(null);
    const now=new Date(),p2=n=>String(n).padStart(2,"0");
    const d=`${now.getFullYear()}-${p2(now.getMonth()+1)}-${p2(now.getDate())}`;
    try{
      const r=await fetch(`https://api-maree.fr/water-levels?site=ile-de-re-saint-martin&from=${d}T00:00&to=${d}T23:59&step=10&tz=Europe/Paris&key=${encodeURIComponent(key)}`);
      if(!r.ok)throw new Error(r.status===401||r.status===403?"Clé invalide.":`Erreur ${r.status}`);
      const data=await r.json();
      if(!data.data?.length)throw new Error("Aucune donnée.");
      try{localStorage.setItem("apimaree_key",key);}catch{}
      const pts=data.data,ex=computeExtrema(pts);
      setTidePoints(pts);setExtrema(ex);
      const pm=ex.find(e=>e.type==="PM"),bm=ex.find(e=>e.type==="BM");
      if(pm&&bm)setCoef(Math.max(20,Math.min(120,Math.round(20+(pm.height-bm.height-0.6)/5*100))));
      const tF=new Date(pts[0].time).getTime(),tL=new Date(pts[pts.length-1].time).getTime(),nMs=Date.now();
      if(nMs>=tF&&nMs<=tL)setNowH(pts[Math.round((nMs-tF)/(tL-tF)*(pts.length-1))]?.height);
    }catch(e){setError(e.message);}
    finally{setLoading(false);}
  },[apiKey]);

  useEffect(()=>{if(apiKey)loadTides(apiKey);},[]);

  const fmtH=iso=>new Date(iso).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit",timeZone:"Europe/Paris"});
  const today=new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});

  const TABS=[
    {id:"ventlive", label:"Vent",      bg:C.ocean, ic:(a)=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={a} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/></svg>},
    {id:"marees",   label:"Marées",    bg:C.sky,   ic:(a)=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={a} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5s2.5 2 5 2 2.5-2 5-2 2.5 2 5 2"/><path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2s2.5 2 5 2 2.5-2 5-2 2.5 2 5 2"/><path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2s2.5 2 5 2 2.5-2 5-2 2.5 2 5 2"/></svg>},
    {id:"trafic",   label:"Trafic",    bg:C.alert, ic:(a)=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={a} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v9a2 2 0 0 1-2 2h-2"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>},
    {id:"vent",     label:"Prévisions",bg:C.green, ic:(a)=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={a} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 20c6-6 8-14 18-16"/><path d="M2 20c4 0 8-2 12-6"/><circle cx="17" cy="8" r="2"/></svg>},
  ];

  /* ── VENT vars ── */
  const wc=wind?.current;
  const kn=wc?toKn(wc.wind_speed_10m):null;
  const gustKn=wc?toKn(wc.wind_gusts_10m):null;
  const bft=kn!=null?toBft(kn):null;
  const dir=wc?.wind_direction_10m;
  const cond=kn==null?null:kn>=12&&kn<=25?{label:"Idéal kite / planche",bg:C.skyBg,color:C.ocean}:kn>=6?{label:"Bon pour le surf",bg:C.greenBg,color:C.green}:kn<6?{label:"Vent calme",bg:"#f5f5f5",color:C.sub}:{label:"Vent fort — prudence",bg:C.alertBg,color:C.alert};
  const now2=new Date();
  const nextH=wind?.hourly?wind.hourly.time.reduce((acc,t,i)=>{if(acc.length>=8)return acc;if(new Date(t)>now2)acc.push({t:new Date(t),spKn:toKn(wind.hourly.wind_speed_10m[i]),gKn:toKn(wind.hourly.wind_gusts_10m[i]),dir:wind.hourly.wind_direction_10m[i]});return acc;},[]):[];
  const maxSpKn=nextH.length?Math.max(...nextH.map(h=>h.spKn)):1;

  const timeStr=new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit",timeZone:"Europe/Paris"});

  return(
    <div style={{background:C.bg,minHeight:"100vh",paddingBottom:"max(40px, calc(env(safe-area-inset-bottom) + 20px))"}}>

      {/* ── HEADER ── */}
      <div style={{background:C.white,borderBottom:`1px solid ${C.border}`,padding:"max(16px, calc(env(safe-area-inset-top) + 10px)) max(18px, calc(env(safe-area-inset-right) + 10px)) 12px max(18px, calc(env(safe-area-inset-left) + 10px))",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:10}}>
        <div style={{width:40,height:40,borderRadius:12,background:C.navy,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M2 20c6-6 8-14 18-16"/><path d="M2 20c4 0 8-2 12-6"/><circle cx="17" cy="8" r="2"/>
          </svg>
        </div>
        <div>
          <div style={{fontSize:17,fontWeight:700,color:C.navy,letterSpacing:"-.3px"}}>Île de Ré <span style={{color:C.ocean}}>Live</span></div>
          <div style={{fontSize:11,color:C.sub,marginTop:1}}>Surf · Kite · Marées · Trafic</div>
        </div>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:5,background:C.greenBg,borderRadius:20,padding:"4px 10px"}}>
          <span style={{width:6,height:6,borderRadius:"50%",background:C.green,display:"inline-block",animation:"blink 1.4s ease-in-out infinite"}}/>
          <span style={{fontSize:10,fontWeight:700,color:C.green,letterSpacing:".5px"}}>LIVE</span>
        </div>
      </div>

      {/* ── TABS ── */}
      <div style={{display:"flex",gap:8,padding:"10px max(16px, calc(env(safe-area-inset-right) + 10px)) 10px max(16px, calc(env(safe-area-inset-left) + 10px))",overflowX:"auto",scrollbarWidth:"none",background:C.white,borderBottom:`1px solid ${C.border}`}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            display:"flex",alignItems:"center",gap:6,
            padding:"9px 14px",borderRadius:22,border:`1.5px solid ${tab===t.id?t.bg:C.border}`,
            cursor:"pointer",fontWeight:600,fontSize:14,whiteSpace:"nowrap",flexShrink:0,
            background:tab===t.id?t.bg:C.white,
            color:tab===t.id?C.white:C.sub,
            boxShadow:tab===t.id?`0 2px 8px ${t.bg}44`:"none",
            transition:"all .15s",
          }}>
            {t.ic(tab===t.id?C.white:t.bg)}
            {t.label}
          </button>
        ))}
      </div>

      <div style={{padding:"16px max(16px, calc(env(safe-area-inset-right) + 10px)) 0 max(16px, calc(env(safe-area-inset-left) + 10px))"}} className="fade">

        {/* ══ VENT LIVE ══ */}
        {tab==="ventlive"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>

            {/* Sélecteur spot */}
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              {["Île de Ré","La Rochelle"].map((s,i)=>(
                <button key={i} onClick={()=>{setWindSpot(i);setWind(null);}} style={{
                  padding:"7px 14px",borderRadius:20,border:`1.5px solid ${windSpot===i?C.ocean:C.border}`,
                  background:windSpot===i?C.skyBg:C.white,color:windSpot===i?C.ocean:C.sub,
                  fontWeight:600,fontSize:13,cursor:"pointer",transition:"all .15s",
                }}>{s}</button>
              ))}
              <button onClick={()=>fetchWind(windSpot)} style={{marginLeft:"auto",background:C.bg,border:`1px solid ${C.border}`,borderRadius:20,color:C.ocean,padding:"7px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:4,fontSize:12,fontWeight:600}}>
                {Icon.refresh(C.ocean,13)} Actualiser
              </button>
            </div>

            {windLoad&&<div className="card" style={{padding:32,textAlign:"center",color:C.sub,fontSize:14}}>Chargement...</div>}
            {wind?.error&&<div className="card" style={{padding:16,color:C.alert,fontSize:13,display:"flex",alignItems:"center",gap:8,borderLeft:`3px solid ${C.alert}`}}><strong>Erreur :</strong> {wind.error}</div>}

            {wc&&!windLoad&&(
              <>
                {/* Badge condition */}
                {cond&&<div style={{background:cond.bg,borderRadius:14,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:10,height:10,borderRadius:"50%",background:cond.color,flexShrink:0}}/>
                  <span style={{fontWeight:600,fontSize:14,color:cond.color}}>{cond.label}</span>
                  <span style={{marginLeft:"auto",fontWeight:700,fontSize:22,color:cond.color}}>Bft {bft}</span>
                </div>}

                {/* Métriques */}
                <div className="metric-grid" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
                  {[
                    {label:"Vent moyen",val:`${kn}`,unit:"kn",sub:`${Math.round(wc.wind_speed_10m*3.6)} km/h`,color:C.ocean},
                    {label:"Rafales",val:`${gustKn}`,unit:"kn",sub:`${Math.round(wc.wind_gusts_10m*3.6)} km/h`,color:C.sky},
                    {label:"Direction",val:degToDir(dir),unit:"",sub:`${Math.round(dir)}°`,color:C.navy},
                    {label:"Température",val:`${Math.round(wc.temperature_2m)}`,unit:"°C",sub:"",color:C.sun},
                    {label:"Humidité",val:`${Math.round(wc.relative_humidity_2m)}`,unit:"%",sub:"",color:C.sky},
                    {label:"Pression",val:`${Math.round(wc.pressure_msl)}`,unit:"",sub:"hPa",color:C.sub},
                  ].map((m,i)=>(
                    <div key={i} className="card" style={{padding:"14px 12px 12px"}}>
                      <div style={{fontSize:11,color:C.sub,fontWeight:600,textTransform:"uppercase",letterSpacing:".5px",marginBottom:7}}>{m.label}</div>
                      <div style={{fontSize:22,fontWeight:700,color:m.color,lineHeight:1,letterSpacing:"-.5px"}}>
                        {m.val}<span style={{fontSize:12,fontWeight:500,color:C.sub,marginLeft:2}}>{m.unit}</span>
                      </div>
                      {m.sub&&<div style={{fontSize:11,color:C.sub,marginTop:3}}>{m.sub}</div>}
                    </div>
                  ))}
                </div>

                {/* Prévisions 8h */}
                <div className="card">
                  <div style={{padding:"12px 16px 8px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:8}}>
                    {Icon.wind(C.ocean,16)}
                    <span style={{fontWeight:700,fontSize:13,color:C.navy}}>Prévisions — 8 prochaines heures</span>
                  </div>
                  <div style={{padding:"4px 16px 12px"}}>
                    {nextH.map((h,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:i<nextH.length-1?`1px solid ${C.border}`:"none"}}>
                        <span style={{fontSize:12,color:C.sub,minWidth:28,fontWeight:600}}>{String(h.t.getHours()).padStart(2,"0")}h</span>
                        <span style={{fontSize:14,fontWeight:700,color:C.ocean,minWidth:50}}>{h.spKn} kn</span>
                        <span style={{fontSize:12,color:C.sub,minWidth:50}}>↑ {h.gKn} kn</span>
                        <span style={{fontSize:11,color:C.sky,minWidth:36,fontWeight:600}}>{degToDir(h.dir)}</span>
                        <div style={{flex:1,background:C.border,borderRadius:4,height:4}}>
                          <div style={{height:4,borderRadius:4,background:C.ocean,width:`${Math.round((h.spKn/maxSpKn)*100)}%`}}/>
                        </div>
                      </div>
                    ))}
                  </div>
                  <div style={{padding:"8px 16px",borderTop:`1px solid ${C.border}`,fontSize:11,color:C.sub,textAlign:"right"}}>
                    Open-Meteo · Météo-France AROME 1.3 km · {timeStr}
                  </div>
                </div>
              </>
            )}
          </div>
        )}

        {/* ══ MARÉES ══ */}
        {tab==="marees"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div className="card" style={{padding:16}}>
              <div style={{fontSize:12,color:C.sub,fontWeight:600,marginBottom:8}}>
                Clé API — <a href="https://api-maree.fr" target="_blank" rel="noreferrer" style={{color:C.ocean}}>api-maree.fr</a>
                <span style={{fontWeight:400,color:C.border,marginLeft:4}}>(IFREMER · gratuit)</span>
              </div>
              <div style={{display:"flex",gap:8}}>
                <input value={apiKey} onChange={e=>setApiKey(e.target.value)} onKeyDown={e=>e.key==="Enter"&&loadTides()}
                  placeholder="Votre clé API..."
                  style={{flex:1,padding:"12px 14px",borderRadius:12,border:`1.5px solid ${C.border}`,background:C.bg,fontSize:15,color:C.text}}/>
                <button onClick={()=>loadTides()} style={{padding:"12px 18px",background:C.ocean,color:C.white,border:"none",borderRadius:12,fontWeight:700,fontSize:15,cursor:"pointer"}}>Charger</button>
              </div>
            </div>
            {loading&&<div className="card" style={{padding:32,textAlign:"center",color:C.sub}}>Chargement...</div>}
            {error&&<div className="card" style={{padding:14,color:C.alert,fontSize:13,borderLeft:`3px solid ${C.alert}`}}>{error}</div>}
            {tidePoints&&!loading&&(
              <div className="card">
                <div style={{padding:"14px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontWeight:700,fontSize:15,color:C.navy}}>Saint-Martin-de-Ré</div>
                  <div style={{fontSize:11,color:C.sub,textTransform:"capitalize"}}>{today}</div>
                </div>
                {nowH!=null&&<div style={{padding:"10px 16px",background:C.skyBg,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:10}}>
                  <span style={{width:8,height:8,borderRadius:"50%",background:C.alert,display:"inline-block",animation:"blink 1.4s ease-in-out infinite",flexShrink:0}}/>
                  <span style={{fontSize:13,color:C.sub}}>Maintenant</span>
                  <span style={{marginLeft:"auto",fontSize:22,fontWeight:700,color:C.ocean}}>{nowH.toFixed(2)} <span style={{fontSize:13,fontWeight:500}}>m</span></span>
                </div>}
                <div style={{display:"flex",gap:10,padding:"14px 16px 10px",flexWrap:"wrap"}}>
                  {extrema.map((e,i)=>(
                    <div key={i} style={{flex:"1 0 auto",minWidth:100,textAlign:"center",background:e.type==="PM"?C.skyBg:C.bg,borderRadius:14,padding:"16px 12px",border:`1px solid ${C.border}`}}>
                      <div style={{fontSize:11,color:C.sub,textTransform:"uppercase",letterSpacing:".6px",fontWeight:600,marginBottom:6}}>{e.type==="PM"?"Pleine mer":"Basse mer"}</div>
                      <div style={{fontSize:22,fontWeight:700,color:e.type==="PM"?C.ocean:C.navy,lineHeight:1,marginBottom:4}}>{fmtH(e.time)}</div>
                      <div style={{fontSize:15,fontWeight:600,color:C.sub}}>{e.height.toFixed(2)} m</div>
                      {e.type==="PM"&&coef&&<div style={{fontSize:12,color:coef>=95?C.alert:C.ocean,fontWeight:700,marginTop:6}}>Coef. {coef}</div>}
                    </div>
                  ))}
                </div>
                {coef&&<div style={{padding:"10px 16px",borderTop:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:12,background:C.bg}}>
                  <div style={{fontSize:28,fontWeight:700,color:coef>=95?C.alert:coef>=70?C.ocean:C.sky,lineHeight:1}}>{coef}</div>
                  <div>
                    <div style={{fontWeight:700,fontSize:13,color:C.text}}>{coef>=95?"Vive-eau — Grandes marées":coef>=70?"Marée moyenne":"Morte-eau"}</div>
                    <div style={{fontSize:11,color:C.sub}}>{coef>=95?"Forts courants, prudence":coef>=70?"Amplitude habituelle":"Faible amplitude"}</div>
                  </div>
                </div>}
                <div style={{padding:"0 16px 16px"}}>
                  <div style={{fontSize:11,color:C.sub,fontWeight:600,padding:"12px 0 8px",display:"flex",justifyContent:"space-between"}}>
                    <span>Courbe 24h</span>
                    {nowH!=null&&<span style={{color:C.alert,fontWeight:700}}>{nowH.toFixed(2)} m</span>}
                  </div>
                  <TideChart points={tidePoints}/>
                </div>
              </div>
            )}
            <a href="https://maree.info/126" target="_blank" rel="noreferrer" className="card" style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",textDecoration:"none"}}>
              {Icon.wave(C.sky,20)}
              <div>
                <div style={{fontWeight:600,fontSize:13,color:C.navy}}>Marégramme — maree.info</div>
                <div style={{fontSize:11,color:C.sub,marginTop:2}}>Graphique interactif · coefficients · surcotes</div>
              </div>
              {Icon.chevron(C.sub)}
            </a>
          </div>
        )}

        {/* ══ TRAFIC ══ */}
        {tab==="trafic"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div className="card">
              <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  {Icon.car(C.alert,18)}
                  <span style={{fontWeight:700,fontSize:14,color:C.navy}}>Respi Ré — Trafic live</span>
                </div>
                <a href="https://re-info-trafic.fr/" target="_blank" rel="noreferrer" style={{fontSize:11,color:C.ocean,textDecoration:"none",fontWeight:600}}>Plein écran</a>
              </div>
              <div style={{width:"100%",height:"min(75vw,60vh)"}}>
                <iframe src="https://re-info-trafic.fr/" style={{width:"100%",height:"100%",border:"none",display:"block"}} title="Respi Ré"/>
              </div>
            </div>
            <div className="card" style={{padding:14,borderLeft:`3px solid ${C.sun}`}}>
              <div style={{fontWeight:600,fontSize:12,color:C.navy,marginBottom:4}}>Conseils été</div>
              <div style={{fontSize:12,color:C.sub,lineHeight:1.6}}>Partir avant 10h ou après 19h · Navette Belvédère → Sablanceaux · Vélo gratuit sur le pont</div>
            </div>
          </div>
        )}

        {/* ══ PRÉVISIONS ══ */}
        {tab==="vent"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div className="card">
              <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  {Icon.compass(C.sun,18)}
                  <span style={{fontWeight:700,fontSize:14,color:C.navy}}>Carte vent — ECMWF</span>
                </div>
                <a href="https://www.windy.com/?46.25,-1.45,11" target="_blank" rel="noreferrer" style={{fontSize:11,color:C.ocean,textDecoration:"none",fontWeight:600}}>Plein écran</a>
              </div>
              <div style={{width:"100%",height:"min(75vw,60vh)"}}>
                <iframe src="https://embed.windy.com/embed.html?type=map&location=coordinates&metricRain=mm&metricTemp=°C&metricWind=km/h&zoom=11&overlay=wind&product=ecmwf&level=surface&lat=46.25&lon=-1.45&detailLat=46.20&detailLon=-1.43&detail=true&pressure=true&message=true"
                  style={{width:"100%",height:"100%",border:"none",display:"block"}} allowFullScreen title="Windy"/>
              </div>
            </div>
            <div className="card" style={{padding:16}}>
              <div style={{fontWeight:700,fontSize:13,color:C.navy,marginBottom:10}}>Sites de prévision</div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {SURF_LINKS.map((l,i)=>(
                  <a key={i} href={l.url} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",gap:12,padding:"11px 14px",borderRadius:12,background:C.bg,textDecoration:"none",border:`1px solid ${C.border}`}}>
                    <div style={{width:8,height:8,borderRadius:"50%",background:l.color,flexShrink:0}}/>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:600,fontSize:13,color:C.navy}}>{l.name}</div>
                      <div style={{fontSize:11,color:C.sub,marginTop:2}}>{l.sub}</div>
                    </div>
                    {Icon.chevron(C.border)}
                  </a>
                ))}
              </div>
            </div>
          </div>
        )}

      </div>

      <div style={{textAlign:"center",padding:"20px max(16px, calc(env(safe-area-inset-right) + 10px)) 0 max(16px, calc(env(safe-area-inset-left) + 10px))",fontSize:11,color:C.border}}>
        Open-Meteo · api-maree.fr IFREMER CC-BY · Windy · Windfinder
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
